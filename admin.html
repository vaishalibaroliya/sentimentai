<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Sentiment AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            background: url("{{ url_for('static', filename='background.jpeg') }}") no-repeat center center fixed;
            background-size: cover;
            color: white;
            min-height: 100vh;
        }

        /* DARK OVERLAY */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 30, 0.85);
            z-index: -1;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .brand {
            font-size: 22px;
            font-weight: 700;
        }

        .menu a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            transition: color 0.3s;
        }

        .menu a:hover {
            color: #3b82f6;
        }

        /* MAIN ADMIN BOX */
        .admin-container {
            display: flex;
            justify-content: center;
            padding-top: 120px;
            min-height: 100vh;
            width: 100%;
        }

        .main-box {
            width: 90%;
            max-width: 900px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .main-box h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            letter-spacing: 1px;
        }

        /* TABLE STYLING */
        .table-container {
            overflow-x: auto; /* Scrollable on small screens */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background: rgba(255, 255, 255, 0.15);
            color: #3b82f6;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            padding: 15px;
            text-align: left;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 15px;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* ACTION BUTTONS */
        .btn-delete {
            padding: 6px 15px;
            border-radius: 20px;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
            text-decoration: none;
            font-size: 12px;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }

        /* BADGE */
        .user-badge {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <h2 class="brand">Sentiment AI</h2>
        <div class="menu">
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/admin">Admin</a>
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        </div>
    </nav>

    <div class="admin-container">
        <div class="main-box">
            <h2>User Management</h2>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>Admin User</td>
                            <td>admin@sentiment.ai</td>
                            <td><span class="user-badge">Admin</span></td>
                            <td><a href="#" class="btn-delete">Remove</a></td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>John Doe</td>
                            <td>john@example.com</td>
                            <td><span class="user-badge">User</span></td>
                            <td><a href="#" class="btn-delete">Remove</a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>

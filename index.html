<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home - Sentiment AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            /* Ensure the path to your image is correct for Flask */
            background: url("{{ url_for('static', filename='background.jpeg') }}") no-repeat center center fixed;
            background-size: cover;
            color: white;
            overflow: hidden; /* Prevents scrollbars if content fits */
        }

        /* DARK OVERLAY */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 30, 0.85);
            z-index: -1;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .navbar h2 {
            font-weight: 700;
            font-size: 24px;
        }

        .navbar .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 15px;
            transition: color 0.3s;
        }

        .navbar .nav-links a:hover {
            color: #3b82f6;
        }

        /* CENTER BOX - This ensures the card is centered on the screen */
        .center-box {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Full viewport height */
            width: 100%;
        }

        /* HOME CARD */
        .home-card {
            width: 500px;
            padding: 60px 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .home-card h1 {
            font-size: 42px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .home-card p {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        /* BUTTON */
        .btn {
            display: inline-block;
            padding: 15px 40px;
            border-radius: 30px;
            background: linear-gradient(135deg, #2563eb, #9333ea);
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4);
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <h2>Sentiment AI</h2>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
         <!--   <a href="/admin">Admin</a>   -->
            <a href="/login">Login</a>
            <a href="/register">Register</a>
            <a href="/about">About</a>
        </div>
    </nav>

    <main class="center-box">
        <div class="home-card">
            <h1>Sentiment AI</h1>
            <p>Analyze comments into Positive, Neutral, or Negative instantly using advanced machine learning.</p>
            <a href="/dashboard" class="btn">Get Started</a>
        </div>
    </main>

</body>
</html>

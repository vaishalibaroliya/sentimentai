<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Sentiment AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: url("{{ url_for('static', filename='background.jpeg') }}") no-repeat center center fixed;
            background-size: cover;
            color: white;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 15, 30, 0.88);
            z-index: -1;
        }

        .navbar {
            position: fixed;
            top: 0; width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .brand { font-size: 22px; font-weight: 700; }

        .menu a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            transition: color 0.3s;
        }
        .menu a:hover { color: #3b82f6; }

        .page {
            padding: 100px 40px 60px;
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card h2 { font-size: 22px; margin-bottom: 20px; color: #93c5fd; }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            padding: 20px 10px;
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            font-size: 13px;
        }

        .stat-box span { display: block; font-size: 28px; font-weight: 700; margin-top: 6px; }
        .stat-total { color: #fff; }
        .stat-pos   { color: #10b981; }
        .stat-neg   { color: #ef4444; }
        .stat-neu   { color: #f59e0b; }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            margin-bottom: 14px;
        }

        input[type="text"]:focus {
            border-color: #3b82f6;
            background: rgba(255,255,255,0.1);
        }
        input::placeholder { color: rgba(255,255,255,0.4); }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #2563eb, #9333ea);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:hover { transform: scale(1.02); opacity: 0.95; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* QUICK TAGS */
        .quick-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .quick-tags label {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            align-self: center;
        }

        .tag {
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            background: transparent;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .tag:hover {
            border-color: #3b82f6;
            color: #3b82f6;
            background: rgba(59,130,246,0.08);
        }

        /* SPINNER */
        .spinner {
            display: none;
            text-align: center;
            padding: 30px;
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }

        .spinner-dots {
            display: inline-flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .spinner-dots span {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #3b82f6;
            animation: bounce 1.2s infinite ease-in-out;
        }
        .spinner-dots span:nth-child(2) { animation-delay: 0.2s; }
        .spinner-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* SUMMARY PILLS */
        .search-summary {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-summary span {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .ss-total    { background: rgba(255,255,255,0.1); }
        .ss-positive { background: rgba(16,185,129,0.15); color: #10b981; }
        .ss-negative { background: rgba(239,68,68,0.15);  color: #ef4444; }
        .ss-neutral  { background: rgba(245,158,11,0.15); color: #f59e0b; }

        /* SENTIMENT BAR */
        .sentiment-bar {
            display: flex;
            height: 6px;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 24px;
            gap: 2px;
        }
        .bar-pos { background: #10b981; }
        .bar-neg { background: #ef4444; }
        .bar-neu { background: #f59e0b; }

        /* COMMENT CARDS */
        .comment-card {
            padding: 16px;
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 12px;
            border-left: 3px solid transparent;
            transition: background 0.2s;
            animation: fadeIn 0.3s ease both;
        }

        .comment-card:hover { background: rgba(255,255,255,0.07); }
        .comment-card.positive { border-left-color: #10b981; }
        .comment-card.negative { border-left-color: #ef4444; }
        .comment-card.neutral  { border-left-color: #f59e0b; }

        .comment-text {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 10px;
            color: rgba(255,255,255,0.9);
        }

        .comment-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            flex-wrap: wrap;
            gap: 8px;
        }

        .comment-left { display: flex; align-items: center; gap: 10px; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-positive { background: rgba(16,185,129,0.2); color: #10b981; }
        .badge-negative { background: rgba(239,68,68,0.2);  color: #ef4444; }
        .badge-neutral  { background: rgba(245,158,11,0.2); color: #f59e0b; }

        .video-link {
            color: #ff4444;
            text-decoration: none;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .video-link:hover { color: #ff6666; }

        .error-msg {
            padding: 14px;
            border-radius: 10px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #ef4444;
            font-size: 13px;
            margin-top: 14px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .navbar { padding: 0 20px; }
            .page { padding: 90px 16px 40px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <h2 class="brand">Sentiment AI</h2>
    <div class="menu">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
        <a href="/about">About</a>
    </div>
</nav>

<div class="page">

    <!-- STATS ROW -->
    <div class="stats">
        <div class="stat-box stat-total">Total Analyzed <span id="stat-total">{{ total }}</span></div>
        <div class="stat-box stat-pos">Positive <span id="stat-pos">{{ positive }}</span></div>
        <div class="stat-box stat-neg">Negative <span id="stat-neg">{{ negative }}</span></div>
        <div class="stat-box stat-neu">Neutral <span id="stat-neu">{{ neutral }}</span></div>
    </div>

    <!-- YOUTUBE KEYWORD SEARCH — MAIN FEATURE -->
    <div class="card">
        <h2>▶️ Search YouTube Comments by Keyword</h2>

        <input type="text" id="keywordInput"
               placeholder="Enter keyword e.g. IPL 2025, iPhone 16, Pushpa 2, Bitcoin..." />

        <!-- QUICK TAGS -->
        <div class="quick-tags">
            <label>Try:</label>
            <button class="tag" onclick="quickSearch('IPL 2025')">IPL 2025</button>
            <button class="tag" onclick="quickSearch('Pushpa 2')">Pushpa 2</button>
            <button class="tag" onclick="quickSearch('iPhone 16')">iPhone 16</button>
            <button class="tag" onclick="quickSearch('Bitcoin')">Bitcoin</button>
            <button class="tag" onclick="quickSearch('AI technology')">AI Technology</button>
        </div>

        <button class="btn" id="searchBtn" onclick="searchKeyword()">
            🔍 Fetch YouTube Comments &amp; Analyze
        </button>

        <!-- LOADING -->
        <div class="spinner" id="spinner">
            <div class="spinner-dots">
                <span></span><span></span><span></span>
            </div>
            <p>Fetching real YouTube comments...</p>
        </div>

        <!-- RESULTS -->
        <div id="searchResults"></div>
    </div>

</div>

<script>
function quickSearch(keyword) {
    document.getElementById('keywordInput').value = keyword;
    searchKeyword();
}

async function searchKeyword() {
    var keyword = document.getElementById('keywordInput').value.trim();
    if (!keyword) {
        alert('Please enter a keyword first!');
        return;
    }

    var btn = document.getElementById('searchBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Fetching...';
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('searchResults').innerHTML = '';

    try {
        var res = await fetch('/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ keyword: keyword })
        });

        var data = await res.json();
        document.getElementById('spinner').style.display = 'none';
        btn.disabled = false;
        btn.textContent = '🔍 Fetch YouTube Comments & Analyze';

        if (data.error) {
            document.getElementById('searchResults').innerHTML =
                '<div class="error-msg">⚠️ ' + data.error + '</div>';
            return;
        }

        if (data.total === 0) {
            document.getElementById('searchResults').innerHTML =
                '<div class="error-msg">No comments found. Try another keyword.</div>';
            return;
        }

        var total = data.total;
        var posW = Math.round(data.positive / total * 100);
        var negW = Math.round(data.negative / total * 100);
        var neuW = Math.round(data.neutral  / total * 100);

        var html = '<div style="margin-top:24px;">';

        // Summary pills
        html += '<div class="search-summary">';
        html += '<span class="ss-total">💬 ' + total + ' comments</span>';
        html += '<span class="ss-positive">✅ Positive: ' + data.positive + '</span>';
        html += '<span class="ss-negative">❌ Negative: ' + data.negative + '</span>';
        html += '<span class="ss-neutral">⚪ Neutral: ' + data.neutral + '</span>';
        html += '</div>';

        // Sentiment bar
        html += '<div class="sentiment-bar">';
        html += '<div class="bar-pos" style="width:' + posW + '%"></div>';
        html += '<div class="bar-neg" style="width:' + negW + '%"></div>';
        html += '<div class="bar-neu" style="width:' + neuW + '%"></div>';
        html += '</div>';

        // Comment cards
        data.results.forEach(function(item, i) {
            var cls = item.sentiment === 'Positive' ? 'positive'
                    : item.sentiment === 'Negative' ? 'negative' : 'neutral';
            var badgeCls = 'badge-' + cls;
            var icon = item.sentiment === 'Positive' ? '✅'
                     : item.sentiment === 'Negative' ? '❌' : '⚪';

            html += '<div class="comment-card ' + cls + '" style="animation-delay:' + (i * 0.04) + 's">';
            html += '<div class="comment-text">' + item.text + '</div>';
            html += '<div class="comment-meta">';
            html += '<div class="comment-left">';
            html += '<span>👤 ' + item.author + '</span>';
            html += '<span>👍 ' + item.likes + '</span>';
            html += '<span class="badge ' + badgeCls + '">' + icon + ' ' + item.sentiment + '</span>';
            html += '<span style="opacity:0.5;">' + item.confidence + '%</span>';
            html += '</div>';
            html += '<a href="' + item.video_url + '" target="_blank" class="video-link">▶ ' + item.video_title.substring(0, 40) + '...</a>';
            html += '</div></div>';
        });

        html += '</div>';
        document.getElementById('searchResults').innerHTML = html;

        // Refresh stats
        refreshStats();

    } catch(err) {
        document.getElementById('spinner').style.display = 'none';
        btn.disabled = false;
        btn.textContent = '🔍 Fetch YouTube Comments & Analyze';
        document.getElementById('searchResults').innerHTML =
            '<div class="error-msg">⚠️ Something went wrong. Make sure app.py is running.</div>';
    }
}

async function refreshStats() {
    try {
        var res = await fetch('/summary');
        var data = await res.json();
        document.getElementById('stat-total').textContent = data.total;
        document.getElementById('stat-pos').textContent   = data.positive;
        document.getElementById('stat-neg').textContent   = data.negative;
        document.getElementById('stat-neu').textContent   = data.neutral;
    } catch(e) {}
}

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('keywordInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchKeyword();
    });
});
</script>

</body>
</html>
